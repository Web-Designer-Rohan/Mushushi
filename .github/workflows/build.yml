name: Mashashi-Forge
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Debug Directory Structure
        run: ls -R
        
      - name: Clean Environment
        # This force-removes the hidden system folders that caused the permission error
        run: rm -rf .bun .cache .config .local .npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We remove the cache option temporarily to avoid the permission bug
          # cache: gradle 

            - name: Grant Execute Permission
        # This will search for gradlew and make it executable no matter where it is
        run: find . -name "gradlew" -exec chmod +x {} +

      - name: Build Debug APK
        run: |
          # Automatically find the directory containing gradlew and build there
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
          echo "Building in $GRADLEW_DIR"
          cd "$GRADLEW_DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mashashi-E-Rank-Release
          # Updated to a wildcard to find the APK wherever it ends up
          path: "**/build/outputs/apk/debug/*.apk"
          

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mashashi-E-Rank-Release
          path: mashashi/app/build/outputs/apk/debug/app-debug.apk
          
