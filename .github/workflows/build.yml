name: Mashashi-Forge
on: 
  push:
  workflow_dispatch: # This adds the manual "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x mashashi/gradlew # Points to the subfolder

      - name: Build Debug APK
        run: |
          cd mashashi
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mashashi-E-Rank-Release
          path: mashashi/app/build/outputs/apk/debug/app-debug.apk
