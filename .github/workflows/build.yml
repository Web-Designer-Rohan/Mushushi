name: Mashashi-Forge
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Debug Directory Structure
        run: ls -R
        
      - name: Clean Environment
        # This force-removes the hidden system folders that caused the permission error
        run: rm -rf .bun .cache .config .local .npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We remove the cache option temporarily to avoid the permission bug
          # cache: gradle 

      - name: Grant Execute Permission
        run: chmod +x mashashi/gradlew

      - name: Build Debug APK
        run: |
          cd mashashi
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mashashi-E-Rank-Release
          path: mashashi/app/build/outputs/apk/debug/app-debug.apk
          
